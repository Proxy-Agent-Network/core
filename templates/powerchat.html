<!DOCTYPE html>
<html lang="en" data-theme="business">
<head>
    <meta charset="UTF-8">
    <title>PowerChat | Proxy Agent Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;700&family=Orbitron:wght@400;700&family=Press+Start+2P&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/language-engine.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme-engine.js') }}"></script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('selectedTheme') || 'business';
            if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); }
        })();
    </script>

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg); color: var(--text); }
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; overflow: hidden; position: relative; }
        
        .chat-history { flex-grow: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .message { display: flex; gap: 15px; animation: fadeIn 0.3s ease; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; border: 2px solid var(--primary); overflow: hidden; }
        .message-bubble { max-width: 80%; padding: 15px 20px; border-radius: 12px; line-height: 1.5; font-family: 'Inter', sans-serif; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .message.user .message-bubble { background: var(--accent); color: var(--bg); font-weight: bold; border: none; }
        
        .message-bubble img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
        
        .input-area { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border: 1px solid var(--border); align-items: center; }
        .input-area input[type="text"] { flex-grow: 1; background: transparent; border: none; color: var(--text); font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; }
        .input-area button { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .input-area button:hover { opacity: 0.8; }
        
        /* 🌟 NEW: File Upload Styles 🌟 */
        .attach-btn { background: transparent !important; color: var(--text) !important; padding: 10px !important; font-size: 1.2rem; opacity: 0.7; }
        .attach-btn:hover { opacity: 1; color: var(--accent) !important; }
        #file-upload-input { display: none; }
        .drag-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(41, 128, 185, 0.9); z-index: 100; border: 4px dashed #fff; border-radius: 12px; align-items: center; justify-content: center; color: #fff; font-size: 2rem; font-weight: bold; font-family: 'Inter', sans-serif; }
        .drag-overlay.active { display: flex; }
        .file-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(128,128,128,0.2); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; border: 1px solid var(--border); }
        
        .typing-indicator { display: none; padding: 15px; font-style: italic; color: var(--text-muted); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    {% include 'components/header.html' %}
    {% include 'components/settings_modal.html' %}

    <div class="chat-container" id="drop-zone">
        <div class="drag-overlay" id="drag-overlay">
            <i class="fas fa-cloud-upload-alt" style="margin-right: 15px;"></i> DROP FILE TO SECURE UPLINK
        </div>

        <div class="chat-history" id="chat-history">
            </div>
        
        <div class="typing-indicator" id="typing-indicator">
            <i class="fas fa-circle-notch fa-spin"></i> Transmitting to Node...
        </div>

        <div class="input-area">
            <input type="file" id="file-upload-input" multiple onchange="handleFiles(this.files)">
            <button class="attach-btn" onclick="document.getElementById('file-upload-input').click()"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="chat-input" placeholder="Enter your mission or drop a file..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    {% include 'components/footer.html' %}

    <script>
        const chatHistory = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // Settings Variables
        let rawSatsBalance = {{ balance|default(20000) }};
        let currentUnit = localStorage.getItem('currencyUnit') || 'SATS';
        const RATES = { SATS: 1, BTC: 0.00000001, USD: 0.00065, CAD: 0.00088, CNY: 0.0047, TWD: 0.021, EUR: 0.00060, GBP: 0.00051, JPY: 0.1, MXN: 0.012, KRW: 0.90, AUD: 0.0010 };

        let appState = {
            history: [],
            lockedAgent: null,
            pendingFiles: [] // Stores files waiting to be sent
        };

        // 🌟 FIX: Smart Initialization (Direct Routing & Bob's Pitch) 🌟
        function initChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const directAgent = urlParams.get('agent');

            let introMsg = "";
            let agentName = "bob";

            if (directAgent) {
                // Direct routing from the Team Roster!
                appState.lockedAgent = directAgent;
                agentName = directAgent.toLowerCase().replace(/ /g, '_').replace(/\./g, '');
                introMsg = `**${directAgent}:** Hello! I am your dedicated specialist. We are now in a secure, direct 1-on-1 session. How can I assist you with your mission today?`;
            } else {
                // Standard Front Desk Welcome
                introMsg = "Welcome to the Native PowerChat! I am Bob, your front desk receptionist.\n\nOur elite team of AI agents is standing by to execute your commands. Here are a few things you can ask us to do:\n\n* **Render Videos:** \"Make a 5-second video of a car racing...\"\n* **Generate Images:** \"Draw a cyberpunk city at night...\"\n* **Deep Research:** \"Analyze the current market trends for AI hardware...\"\n* **Medical Consultation:** \"I need to speak with a doctor about stress...\"\n* **Web Search:** \"What is the current price of Bitcoin?\"\n\nJust type your mission below, and Charlie will route you to the perfect specialist!";
            }
            
            appState.history.push({role: "assistant", content: introMsg});
            appendMessage('assistant', introMsg, false, agentName);
        }

        // --- DRAG AND DROP LOGIC ---
        const dropZone = document.getElementById('drop-zone');
        const dragOverlay = document.getElementById('drag-overlay');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dragOverlay.classList.add('active'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dragOverlay.classList.remove('active'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            for(let i=0; i<files.length; i++) {
                appState.pendingFiles.push(files[i]);
                // Visual feedback in the input box
                chatInput.value += ` [Attached: ${files[i].name}] `;
            }
        }

        function parseMarkdown(text) {
            if (!text) return "⚠️ Error: Received empty response from node.";
            let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            
            const videoMatch = html.match(/'([^']+\.mp4)'/i);
            if (videoMatch) {
                html += `<br><video width="100%" controls style="border-radius:8px; margin-top:10px; border:1px solid var(--border); background:#000;"><source src="/static/${videoMatch[1]}" type="video/mp4">Your browser does not support the video tag.</video>`;
            }
            
            const imageMatch = html.match(/'([^']+\.(?:jpg|jpeg|png|webp|gif))'/i);
            if (imageMatch) {
                html += `<br><img src="/static/${imageMatch[1]}" alt="Generated Image" style="max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border);">`;
            }
            return html;
        }

        function appendMessage(role, text, isError = false, agentName = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            
            if (role === 'user') {
                avatar.innerHTML = '👤';
            } else if (isError) {
                avatar.innerHTML = '⚠️';
            } else {
                let imgName = 'bob';
                if (agentName) { imgName = agentName.toLowerCase().replace(/ /g, '_').replace(/\./g, ''); } 
                else if (text.includes('Charlie:')) { imgName = 'charlie'; } 
                else if (appState.lockedAgent) { imgName = appState.lockedAgent.toLowerCase().replace(/ /g, '_').replace(/\./g, ''); }
                
                avatar.innerHTML = `<img src="/static/images/roster/${imgName}-50.jpg" onerror="this.outerHTML='🤖'" style="width:100%; height:100%; object-fit:cover;">`;
            }
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            if (isError) bubble.style.color = '#e74c3c';
            
            // Render the text
            bubble.innerHTML = parseMarkdown(text);
            
            // If the user sent files, render little badges
            if (role === 'user' && appState.pendingFiles.length > 0) {
                appState.pendingFiles.forEach(f => {
                    bubble.innerHTML += `<br><div class="file-badge"><i class="fas fa-file-alt"></i> ${f.name}</div>`;
                });
                appState.pendingFiles = []; // Clear queue after rendering
            }
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function drawPaymentButtons(data) {
            currentPaymentData = data;
            const btnDiv = document.createElement('div');
            btnDiv.className = 'message assistant payment-panel';
            btnDiv.innerHTML = `
                <div class="avatar">💎</div>
                <div class="message-bubble" style="background: rgba(46, 204, 113, 0.1); border: 2px solid #2ecc71;">
                    <strong>L402 Treasury Paywall</strong><br>
                    Cost: ${data.cost} SATS<br>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <button onclick="payAndGenerate()" style="background: #2ecc71; color: #000; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Inter', sans-serif;">⚡ Pay & Generate</button>
                        <button onclick="cancelPayment(this)" style="background: transparent; color: #e74c3c; border: 1px solid #e74c3c; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif;">❌ Cancel</button>
                    </div>
                </div>
            `;
            chatHistory.appendChild(btnDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function cancelPayment(btnElement) {
            currentPaymentData = null;
            btnElement.closest('.payment-panel').style.display = 'none';
            appendMessage('user', 'Actually, let us discuss this further before I pay.');
            appState.history.push({role: 'user', content: 'Actually, let us discuss this further before I pay.'});
        }

        async function payAndGenerate() {
            if (!currentPaymentData) return;
            
            document.querySelectorAll('.payment-panel').forEach(p => p.style.display = 'none');
            appendMessage('user', `⚡ I have authorized the ${currentPaymentData.cost} SAT treasury payment.`);
            
            typingIndicator.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Rendering Media (This may take a few seconds)...';
            typingIndicator.style.display = 'block';
            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            try {
                const response = await fetch('/api/v1/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentPaymentData)
                });
                const data = await response.json();
                
                typingIndicator.style.display = 'none';
                typingIndicator.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Transmitting to Node...';
                
                // Deduct from local wallet display
                rawSatsBalance -= currentPaymentData.cost;
                updateBalanceDisplay();

                let isError = data.type === "error";
                appendMessage(data.role || 'assistant', data.content, isError, data.agent_name);
                if (!isError) appState.history.push({role: 'assistant', content: data.content});
                
            } catch (e) {
                typingIndicator.style.display = 'none';
                typingIndicator.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Transmitting to Node...';
                appendMessage('assistant', '⚠️ Payment Execution Failed: Unable to reach the backend API.', true);
            }
            
            currentPaymentData = null;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text && appState.pendingFiles.length === 0) return;

            appendMessage('user', text);
            appState.history.push({role: "user", content: text});
            chatInput.value = '';
            
            typingIndicator.style.display = 'block';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        history: appState.history.slice(-5),
                        locked_agent: appState.lockedAgent
                    })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                if (data.type === "message" || data.type === "error") {
                    let isError = data.type === "error";
                    appendMessage(data.role || 'assistant', data.content, isError, data.new_locked_agent);
                    if (!isError) appState.history.push({role: data.role || 'assistant', content: data.content});
                    if (data.new_locked_agent !== undefined) appState.lockedAgent = data.new_locked_agent;
                } 
                else if (data.type === "payment_required") {
                    appendMessage('assistant', data.message, false, data.l5_artist);
                    appState.history.push({role: 'assistant', content: data.message});
                    drawPaymentButtons(data);
                }
                
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('assistant', '⚠️ Network Error: Unable to reach the backend API.', true);
            }
        }

        // --- UI & SETTINGS LOGIC RESTORED ---
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('active'); }
        window.onclick = function(event) { if (event.target == document.getElementById('settingsModal')) document.getElementById('settingsModal').classList.remove('active'); }
        function updateBalanceDisplay() {
            const el = document.getElementById('hud-balance'); if (!el) return;
            let val = rawSatsBalance * RATES[currentUnit];
            if (currentUnit === 'SATS') el.innerText = Math.floor(val).toLocaleString() + " SATS"; 
            else if (currentUnit === 'BTC') el.innerText = val.toFixed(8) + " BTC"; 
            else el.innerText = val.toLocaleString('en-US', {style: 'currency', currency: currentUnit});
        }
        function changeUnit(unit) { currentUnit = unit; localStorage.setItem('currencyUnit', unit); const label = document.getElementById('unit-label'); if(label) label.innerText = unit; updateBalanceDisplay(); }
        function updateNetworkStats() {
            fetch('/api/v1/network/stats').then(r => r.json()).then(data => {
                const healthSpan = document.getElementById('health-peers');
                if (healthSpan) {
                    if (data.peers > 0) { healthSpan.innerHTML = `● ${data.peers} CONNECTED`; healthSpan.style.color = "#2ecc71"; } 
                    else { healthSpan.innerHTML = `● 0 PEERS (SEARCHING)`; healthSpan.style.color = "#f1c40f"; }
                }
            }).catch(e=>{});
        }

        window.addEventListener('DOMContentLoaded', () => {
            initChat();
            if (typeof ThemeEngine !== 'undefined') ThemeEngine.init('settings-theme-selector');
            if (typeof LanguageEngine !== 'undefined') LanguageEngine.init('language-selector');
            const unitLabel = document.getElementById('unit-label'); if(unitLabel) unitLabel.innerText = currentUnit;
            updateBalanceDisplay(); updateNetworkStats(); setInterval(updateNetworkStats, 30000);
        });
    </script>
</body>
</html>
